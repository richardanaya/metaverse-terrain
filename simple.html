<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>metaverse-terrain — minimal example</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <!--
      Host this page with the library and terrain-*.png textures.
      From npm, point metaverse-terrain at your copy or:
      https://cdn.jsdelivr.net/npm/metaverse-terrain/index.js
    -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three/examples/jsm/",
          "metaverse-terrain": "./index.js"
        }
      }
    </script>
  </head>
  <body>
    <canvas></canvas>
    <script type="module" src="./simple.js"></script>
  </body>
</html>
